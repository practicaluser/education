<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>자바스크립트 스탑워치</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    #display {
      font-size: 2em;
      margin-bottom: 20px;
    }
    button {
      font-size: 1em;
      margin: 5px;
      padding: 10px 20px;
    }
  </style>
</head>
<body>
  <h1>자바스크립트 스탑워치</h1>
  <div id="display">00:00:00</div>
  <button onclick="start()">시작</button>
  <button onclick="stop()">정지</button>
  <button onclick="reset()">리셋</button>

  <script>
    let timer;
    let seconds = 0;
    let minutes = 0;
    let hours = 0;

    function updateDisplay() {
      let h = String(hours).padStart(2, '0');
      let m = String(minutes).padStart(2, '0');
      let s = String(seconds).padStart(2, '0');
      document.getElementById("display").textContent = `${h}:${m}:${s}`;
    }

    function start() {
      if (!timer) {
        timer = setInterval(() => {
          seconds++;
          if (seconds === 60) {
            seconds = 0;
            minutes++;
          }
          if (minutes === 60) {
            minutes = 0;
            hours++;
          }
          updateDisplay();
        }, 1000);
      }
    }

    function stop() {
      clearInterval(timer);
      timer = null;
    }

    function reset() {
      stop();
      seconds = 0;
      minutes = 0;
      hours = 0;
      updateDisplay();
    }
  </script>
</body>
</html>
