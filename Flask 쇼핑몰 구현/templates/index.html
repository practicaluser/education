{% extends 'base.html' %} {% block content %}
<div class="text-center mt-5">
  <h1>🏠 홈 페이지</h1>
  <p class="lead mt-3">이곳은 Flask 웹 애플리케이션의 시작 화면입니다.</p>
  <div class="mt-4">
    {% if session['username'] %}
    <p><strong>{{ session['username'] }}</strong>님 환영합니다!</p>
    {% else %}
    <a href="{{ url_for('login') }}" class="btn btn-primary me-2">로그인</a>
    {% endif %}
    <a href="{{ url_for('products') }}" class="btn btn-outline-secondary"
      >상품 보기</a
    >
  </div>
</div>
{% endblock %}
