<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>4월 포토 캘린더</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #fffafc;
        }
        h1 {
            color: #2c3e50;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 70%;
            background-image: url('scene1.png'); /* 배경 이미지 */
            background-size: cover;             /* 이미지 크기 맞춤 */
            background-position: center;        /* 중앙 정렬 */
            color: #000;                        /* 글자 색 */
        }
        th, td {
            border: 1px solid rgba(0,0,0,0.3);  /* 반투명 테두리 */
            padding: 10px;
            width: 14%;
            height: 80px;
            background-color: rgba(255,255,255,0.6); /* 반투명 배경으로 숫자 가독성 확보 */
        }
        th {
            background-color: rgba(240,240,240,0.8);
        }
        td {
            vertical-align: top;
        }
        p {
            font-size: 1.1em;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>🌸 4월 포토 캘린더 🌸</h1>

    <table>
        <tr>
            <th>Sun</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
            <th>Sat</th>
        </tr>

        <tr>
            <td></td><td></td><td></td><td>1</td><td>2</td><td>3</td><td>4</td>
        </tr>
        <tr>
            <td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td>
        </tr>
        <tr>
            <td>12</td><td>13</td><td>14</td><td>15</td><td>16</td><td>17</td><td>18</td>
        </tr>
        <tr>
            <td>19</td><td>20</td><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td>
        </tr>
        <tr>
            <td>26</td><td>27</td><td>28</td><td>29</td><td>30</td><td></td><td></td>
        </tr>
    </table>

    <p>바깥은 봄 향기로 가득합니다. 즐거운 한 달을 보내세요.</p>
</body>
</html>
