{% extends 'base.html' %} {% block content %}
<h3>🛒 상품 목록</h3>
<table class="table table-dark table-striped mt-3 text-center align-middle">
  <thead>
    <tr>
      <th>#</th>
      <th>상품명</th>
      <th>가격</th>
      <th>담기</th>
    </tr>
  </thead>
  <tbody>
    {% for product in products %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ product.name }}</td>
      <td>{{ "{:,}".format(product.price) }}원</td>
      <td>
        <a
          href="{{ url_for('add_to_cart', product_id=product.id) }}"
          class="btn btn-primary btn-sm"
          >담기</a
        >
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
